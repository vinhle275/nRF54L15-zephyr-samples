CONFIG_NCS_SAMPLES_DEFAULTS=y

# ==== 1. KHÓA CHẾ ĐỘ BIÊN DỊCH TỐI ƯU DUNG LƯỢNG & ĐIỆN NĂNG ====
CONFIG_SIZE_OPTIMIZATIONS=y

# ==== 2. QUẢN LÝ NĂNG LƯỢNG CHO DÒNG NRF54L ====
# Bật bộ khung quản lý điện năng nền tảng
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Sửa lỗi 'PM_POLICY_DEFAULT': Với Zephyr mới trên nRF54L, thay vì gọi POLICY_DEFAULT,
# ta dùng cờ POLICY_APP hoặc để hệ thống tự điều phối trạng thái nguồn (Power States).
CONFIG_PM_POLICY_DEFAULT=y
CONFIG_PM_DEVICE_RUNTIME=y

# ==== 3. TẮT LOGGING & SERIAL DRIVER (CHỐNG DÒNG RÒ UART) ====
CONFIG_LOG=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n

# Sửa lỗi 'PRINTK': Cho phép hệ thống bật PRINTK (y) nhưng không xuất ra phần cứng qua UART
CONFIG_PRINTK=y

# ==== 4. TẤT CẢ CÁC TÍNH NĂNG KIỂM TRA / ASSERT ĐỀU PHẢI TẮT ====
CONFIG_ASSERT=n
CONFIG_RESET_ON_FATAL_ERROR=n

# ==== 5. CẤU HÌNH ĐỊNH TUYẾN LƯU TRỮ ZMS ====
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_NVS=n

# Cấu hình chung ứng dụng
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Mesh Light"
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HWINFO=y
CONFIG_DK_LIBRARY=y
CONFIG_PM_SINGLE_IMAGE=y
CONFIG_SOC_FLASH_NRF_PARTIAL_ERASE=n

# ==== 6. BLUETOOTH & LPN CHU KỲ DÀI KHÔNG THỨC GIẤC ====
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="Mesh Light"
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_BT_OBSERVER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_RX_STACK_SIZE=2700

# Tắt toàn bộ tính năng Controller phụ trợ để hạ dòng tĩnh
CONFIG_BT_CTLR_LE_ENC=n
CONFIG_BT_PHY_UPDATE=n
CONFIG_BT_CTLR_CHAN_SEL_2=n
CONFIG_BT_CTLR_MIN_USED_CHAN=n
CONFIG_BT_CTLR_PRIVACY=n

# Mesh Low Power Node thiết lập chu kỳ ngủ dài
CONFIG_BT_MESH=y
CONFIG_BT_MESH_LOW_POWER=n
CONFIG_BT_MESH_RELAY=y
CONFIG_BT_MESH_FRIEND=y
CONFIG_BT_MESH_TX_SEG_MAX=10
CONFIG_BT_MESH_PB_GATT=y
CONFIG_BT_MESH_GATT_PROXY=y
CONFIG_BT_MESH_PROXY_USE_DEVICE_NAME=y
CONFIG_BT_MESH_DK_PROV=y
CONFIG_BT_MESH_ONOFF_SRV=y
CONFIG_BT_MESH_CRPL=32
CONFIG_BT_MESH_MSG_CACHE_SIZE=32

# Ép khoảng thời gian Poll Timeout tối đa (Hơn 60 giây mới dậy xin gói tin 1 lần)
CONFIG_BT_MESH_LPN_POLL_TIMEOUT=600
CONFIG_BT_MESH_LPN_RECV_DELAY=10
CONFIG_BT_MESH_LPN_MIN_QUEUE_SIZE=1

# Giảm công suất phát RF xuống mức thấp nhất để tiết kiệm năng lượng lúc phát sóng
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_TX_PWR_ANTENNA=0

CONFIG_GPIO=y





# =========================================================
# TỐI ƯU HÓA HỆ ĐIỀU HÀNH VÀ GRTC CHO NRF54L15
# =========================================================

# 1. Ép hệ điều hành không thức dậy định kỳ (Tickless Mode)
# Thay vì CPU phải dậy mỗi 1ms để đếm thời gian, nó sẽ giao toàn quyền cho GRTC đếm
# và chỉ thức dậy chính xác khi GRTC gọi (sau 10 giây hoặc 150ms).
CONFIG_TICKLESS_KERNEL=y

# 2. Tối ưu hóa sâu cho Power Management
# Cho phép hệ thống tự động đưa RAM và các thiết bị ngoại vi vào trạng thái ngắt điện (Retention)

# 3. Tắt System Watchdog (nếu không dùng đến)
# Watchdog đôi khi ngầm sử dụng timer riêng gây tốn thêm khoảng vài uA
CONFIG_WATCHDOG=n

# 4. Ép mức ưu tiên phần cứng cao nhất cho việc quản lý năng lượng LPN
CONFIG_BT_MESH_LPN_AUTO=y



# =========================================================
# CẤU HÌNH BỔ SUNG: KÍCH HOẠT GRTC VÀ QUẢN LÝ NĂNG LƯỢNG SÂU
# =========================================================

# 1. Định tuyến Driver Clock hệ thống chạy trên phần cứng GRTC thay cho RTC cũ
# 1. Kích hoạt GRTC Driver
# =========================================================
# CẤU HÌNH ĐÃ SỬA ĐỔI: SỬ DỤNG GRTC & BẢO TOÀN LỆNH MESH
# =========================================================

CONFIG_NRFX_GRTC=y

# 2. Để tần số System Tick chạy ở mức 1 MHz (1000000) chuẩn của dòng nRF54L
# Điều này giúp các hàm k_work định thời chớp tắt Identify 30ms chạy chính xác hoàn hảo
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=1000000



CONFIG_BT_MESH_ONOFF_CLI=y