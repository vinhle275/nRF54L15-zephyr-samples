CONFIG_NCS_SAMPLES_DEFAULTS=y

# Deferred logging helps improve LPN power consumption
# when friendship is established.
CONFIG_LOG_MODE_DEFERRED=y

# General configuration
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Mesh Light Switch"
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_NVS_LOOKUP_CACHE=y
CONFIG_SETTINGS_NVS_NAME_CACHE=y
CONFIG_HWINFO=y
CONFIG_DK_LIBRARY=y
CONFIG_PM_SINGLE_IMAGE=y
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000
CONFIG_SOC_FLASH_NRF_PARTIAL_ERASE=y

# Bluetooth configuration
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="Mesh Light Switch"
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_BT_OBSERVER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SETTINGS=y
# Increase RX stack size to avoid overflow during provisioning
CONFIG_BT_RX_STACK_SIZE=2700

# Disable unused Bluetooth features
CONFIG_BT_CTLR_LE_ENC=n
CONFIG_BT_PHY_UPDATE=n
CONFIG_BT_CTLR_CHAN_SEL_2=n
CONFIG_BT_CTLR_MIN_USED_CHAN=n
CONFIG_BT_CTLR_PRIVACY=n

# Bluetooth Mesh configuration
CONFIG_BT_MESH=y
CONFIG_BT_MESH_RELAY=y
CONFIG_BT_MESH_FRIEND=y
CONFIG_BT_MESH_TX_SEG_MAX=32
CONFIG_BT_MESH_PB_GATT=y
CONFIG_BT_MESH_GATT_PROXY=y
CONFIG_BT_MESH_PROXY_USE_DEVICE_NAME=y
CONFIG_BT_MESH_DK_PROV=y

# Bluetooth Mesh models
CONFIG_BT_MESH_ONOFF_CLI=y



CONFIG_BT_MESH_RELAY_ENABLED=y

CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_TX_PWR_ANTENNA=-8








# Bật hệ thống LOG chuẩn của Zephyr và ép in ra RTT lập tức
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_RTT=y

# Tắt cổng UART để không bị phân tán Log ra chân phần cứng
CONFIG_LOG_BACKEND_UART=n

# Cấu hình chuyển toàn bộ Log sang SEGGER RTT
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# Tắt backend UART để tránh xung đột debug
CONFIG_LOG_BACKEND_UART=n


# Bật hệ thống Log tổng thể và chuyển hướng sang RTT Backend
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# Tắt cổng UART để dồn toàn bộ dữ liệu log vào RTT
CONFIG_LOG_BACKEND_UART=n

# Cấu hình định dạng Log hiển thị thời gian và tên hàm (Quan trọng)
CONFIG_LOG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y


# Bật hệ thống Log của Zephyr
CONFIG_LOG_MODE_IMMEDIATE=y

# Chuyển hướng printk và toàn bộ hệ thống Log sang Segger RTT
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_PRINTK=y

# Tắt hẳn cổng UART backend để tránh xung đột chân debug
CONFIG_LOG_BACKEND_UART=n




# Bật tính năng Log nói chung
CONFIG_LOG=y

# BẬT DEBUG TẦNG MẠNG MESH (Quan trọng nhất)
CONFIG_BT_MESH_LOG_LEVEL_DBG=y
CONFIG_BT_MESH_NET_LOG_LEVEL_DBG=y

# Bật thêm log của tầng Advertiser nếu muốn xem gói tin thô đi vào
CONFIG_BT_MESH_ADV_LOG_LEVEL_DBG=y